    <div id="shortcutsModal" class="modal app-modal app-modal--shortcuts hidden" aria-hidden="true">
      <div class="modal-backdrop"></div>
      <div class="modal-content" role="dialog" aria-modal="true" aria-labelledby="shortcutsTitle">
        <div class="modal-header">
          <h3 id="shortcutsTitle">Keyboard Shortcuts</h3>
          <div class="shortcuts-tip">
            <span class="kbd">Ctrl + Shift + /</span>
            <span class="shortcuts-tip-label">Open this window</span>
          </div>
        </div>
        <div id="shortcutsContent" class="modal-list shortcuts-groups" aria-live="polite">
          <div class="version-loading">Loading shortcuts...</div>
        </div>
        <div class="modal-actions">
          <button id="shortcutsClose" class="ghost">Close</button>
        </div>
      </div>
    </div>
