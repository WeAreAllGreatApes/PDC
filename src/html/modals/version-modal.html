<div id="versionModal" class="modal app-modal app-modal--version hidden" aria-hidden="true">
  <div class="modal-backdrop"></div>
  <div class="modal-content" role="dialog" aria-modal="true" aria-labelledby="versionTitle">
    <h3 id="versionTitle">Version History</h3>
    <div id="versionHistory" class="version-history" aria-live="polite">
      <div class="version-loading">Loading version notes...</div>
    </div>
    <div class="modal-actions">
      <button id="versionClose" class="ghost">Close</button>
    </div>
  </div>
</div>
