name: Docker CI

on:
  push:
    branches: [main]

permissions:
  contents: read
  packages: write

jobs:
  build-latest:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Normalize image path
        id: vars
        run: |
          echo "owner_lc=${GITHUB_REPOSITORY_OWNER,,}" >> "$GITHUB_OUTPUT"
          echo "image_lc=pdc" >> "$GITHUB_OUTPUT"

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build image
        run: docker build -t ghcr.io/${{ steps.vars.outputs.owner_lc }}/${{ steps.vars.outputs.image_lc }}:latest .

      - name: Push image
        run: docker push ghcr.io/${{ steps.vars.outputs.owner_lc }}/${{ steps.vars.outputs.image_lc }}:latest
